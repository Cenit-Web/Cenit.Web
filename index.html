<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cenit Web - Agencia Digital Puebla | Soluciones Web Profesionales</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%231b4d3e' stroke='%23ffffff' stroke-width='5'/><circle cx='50' cy='50' r='10' fill='%232ecc71'/></svg>" type="image/svg+xml">
    <style>
        /* Estilos Globales */
        body {
            font-family: 'Avenir', 'Avenir Next', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #1b4d3e;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Asegura que el body tenga al menos la altura de la ventana */
        }

        main {
            flex: 1; /* Permite que el contenido principal crezca y empuje el footer hacia abajo */
            padding: 20px;
        }

        /* Cabecera (Header) */
        header {
            background-color: #ffffff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        /* Decoración de búsqueda simulada */
        .search-container {
            display: flex;
            align-items: center;
            flex-grow: 1; /* Toma el espacio disponible */
            margin-right: 20px;
            background-color: #f1f1f1;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #ccc;
        }

        .search-icon {
            font-size: 1.2em;
            color: #888;
            margin-right: 10px;
        }

        .search-text {
            color: #888;
            font-size: 0.9em;
            pointer-events: none; /* No interactivo, solo decorativo */
        }

        .brand-container {
            display: flex;
            align-items: center;
            flex-shrink: 0; /* Evita que el logo se encoja */
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            margin-right: 15px;
        }

        .brand-text {
            font-size: 1.5em;
            font-weight: bold;
            color: #1b4d3e;
        }

        /* Resto del contenido principal (Placeholder) */
        .content-placeholder {
            text-align: center;
            padding: 50px 0;
        }

        /* Pie de Página (Footer) */
        footer {
            background-color: #1b4d3e; /* Fondo oscuro de la marca */
            color: #ffffff;
            padding: 20px 0;
            text-align: center;
            width: 100%;
        }

        .footer-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .social-media-container {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .social-text {
            font-size: 1.1em;
            margin-right: 10px;
        }

        /* Icono de Instagram con el degradado oficial */
        .instagram-link {
            text-decoration: none;
            color: inherit;
        }

        .instagram-icon-wrapper {
            display: inline-block;
            vertical-align: middle;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%);
            border-radius: 8px; /* Pequeño radio para que parezca el icono oficial */
            position: relative;
        }

        /* El icono de glifo blanco dentro del wrapper */
        .instagram-icon-wrapper svg {
            width: 20px;
            height: 20px;
            fill: #ffffff;
            position: absolute;
            top: 5px;
            left: 5px;
        }

        .copyright-text {
            font-size: 0.8em;
            opacity: 0.8;
        }

    </style>
</head>
<body>

    <header>
        <div class="search-container">
            <span class="search-icon">&#128269;</span> <span class="search-text">Buscar soluciones web...</span>
        </div>

        <div class="brand-container">
            <svg class="brand-logo" xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%231b4d3e' stroke='%23ffffff' stroke-width='5'/><circle cx='50' cy='50' r='10' fill='%232ecc71'/></svg>
            <span class="brand-text">CenitWeb</span>
        </div>
    </header>

    <main>
        <div class="content-placeholder">
            <h1>Bienvenido a CenitWeb</h1>
            <p>Tu agencia digital en Puebla para soluciones web profesionales.</p>
            <p>Estamos construyendo algo increíble.</p>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="social-media-container">
                <span class="social-text">Síguenos:</span>
                <a href="https://www.instagram.com/cenit_web/" target="_blank" class="instagram-link" title="Visita nuestro perfil de Instagram (cenit_web)">
